<div class="container">
  <header class="header">
    <h1 class="title">🌍 Country Explorer</h1>
    <p class="subtitle">Discover countries around the world with weather information</p>
  </header>

  <div class="search-section">
    <div class="search-container">
      <input
        class="input-field"
        [(ngModel)]="searchText"
        (keyup.enter)="goToDetails()"
        placeholder="🔍 Search for a country..."
        type="text"
      />
      <button class="btn search-btn" (click)="goToDetails()">
        <span class="btn-text">Search</span>
      </button>
    </div>
  </div>

  <div class="status-section">
    <div *ngIf="error" class="error-message">
      ⚠️ {{ error }}
    </div>
  </div>

  <div class="countries-grid" *ngIf="!loading && !error">
    <div
      class="country-card card"
      *ngFor="let country of filteredCountries; trackBy: trackByCountry"
    >
      <div class="card-header">
        <img
          [src]="country.flags.png"
          [alt]="country.name.common + ' flag'"
          class="flag-image"
          loading="lazy"
        />
        <div class="country-info">
          <h3 class="country-name">{{ country.name.common }}</h3>
          <span class="country-region">{{ country.region }}</span>
        </div>
      </div>

      <div class="card-body">
        <div class="country-details">
          <div class="detail-item">
            <span class="detail-label">Capital:</span>
            <span class="detail-value">{{ country.capital?.[0] || 'N/A' }}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Population:</span>
            <span class="detail-value">{{ country.population | number }}</span>
          </div>
        </div>
      </div>

      <div class="card-footer">
        <button
          class="btn view-details-btn"
          [routerLink]="['/details', country.name.common]"
        >
          View Details 🌤️
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && !error && filteredCountries.length === 0" class="no-results">
    <div class="no-results-icon">🔍</div>
    <h3>No countries found</h3>
    <p>Try adjusting your search terms</p>
  </div>
</div>
